[package]
name = "kassiber-ffi"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true
description = "KASSIBER UniFFI Android Bindings"

[lib]
crate-type = ["cdylib", "staticlib"]
name = "kassiber_ffi"

# NOTE: bindings are defined with proc macros (`uniffi::setup_scaffolding!()`
# in src/lib.rs). There is intentionally no build.rs / UDL file; the Kotlin
# bindings are generated from the built cdylib with uniffi-bindgen
# (see ../build-android.sh).

[dependencies]
kassiber-crypto.workspace = true
kassiber-transport.workspace = true
uniffi.workspace = true
tokio.workspace = true
log.workspace = true
rand.workspace = true
postcard.workspace = true
thiserror.workspace = true
